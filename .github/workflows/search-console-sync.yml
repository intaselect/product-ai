name: Search Console Sync

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Sync Search Console Data
        run: |
          curl -X GET "https://www.bpschat.com/api/search-console-sync?secret=${{ secrets.CRON_SECRET }}"

      - name: Generate Search Pages
        run: |
          curl -X GET "https://www.bpschat.com/api/search-console-generate-pages?secret=${{ secrets.CRON_SECRET }}"

      - name: Generate Landing Pages
        run: |
          curl -X GET "https://www.bpschat.com/api/search-console-generate-landing-pages?secret=${{ secrets.CRON_SECRET }}"